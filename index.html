<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F&F Crew Switcher — DOM Lab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- 1. Add an <h1> with id="page-title" and the text "Welcome to the Crew" -->
        <h1 id="page-title">Welcome to the crew</h1>
      <p id="tagline">You don't turn your back on family. Even when they do.</p>

      <!-- ============================== -->
      <!-- CREW CARD                       -->
      <!-- ============================== -->
      <div id="crew-card" class="card">
        <!-- 2. Add an <h2> with id="member-name" and the text "Dominic Toretto" -->
          <h2 id="member-name">Dominic Toretto</h2>
        <img
          id="member-photo"
          src="https://www.nme.com/wp-content/uploads/2021/10/Fast-Furious.jpg"
          alt="Crew member photo"
        />

        <!-- 3. Add a <p> with class="bio" and the text:
           "Street racer. Family man. Drives a 1970 Dodge Charger R/T." -->
          <p class="bio">Street racer. Family man. Drives a 1970 Dodge Charger R/T.</p>
        <ul id="stats">
          <!-- 4. Add three <li> elements with class="stat":
             - "Driving: 99"
             - "Loyalty: 100"
             - "Quarter Mile: 9.4s"-->
             <li class="stat">Driving: 99</li>
             <li class="stat">Loyalty: 100</li>
             <li class="stat">Quarter Mile: 9.4s</li>
        </ul>

        <button id="remove-member-btn">Remove from Crew</button>
      </div>

      <!-- ============================== -->
      <!-- CHARACTER SWITCHER              -->
      <!-- ============================== -->
      <div id="switcher" class="card">
        <h3>Switch Crew Member</h3>
        <button class="switch-btn" data-member="dom">Dom</button>
        <button class="switch-btn" data-member="brian">Brian</button>
        <button class="switch-btn" data-member="letty">Letty</button>
        <button class="switch-btn" data-member="hobbs">Hobbs</button>
        <button class="switch-btn" data-member="han">Han</button>
        <button id = "surprise-btn" class="switch-btn" data-member="">Surprise me</button>
      </div>

      <!-- ============================== -->
      <!-- ADD-A-MEMBER FORM               -->
      <!-- ============================== -->
      <div id="form-section" class="card">
        <h3 id="form-title">Add Yourself to the Crew</h3>
        <form id="add-member-form">
          <label for="new-name">Name</label>
          <input type="text" id="new-name" name="new-name" />
          <label for="new-ride">Ride</label>
          <input type="text" id="new-ride" name="new-ride" />
          <input type="submit" value="Add to Crew" />
        </form>

        <!-- 5. Build a form with id="add-member-form" containing:
           - a <label for="new-name"> with text "Name"
           - an <input type="text" id="new-name" name="new-name">
           - a <label for="new-ride"> with text "Ride"
           - an <input type="text" id="new-ride" name="new-ride">
           - an <input type="submit" value="Add to Crew">
      -->

        <ul id="recruits">
          <!-- New recruits will be added here by JavaScript -->
        </ul>
      </div>

      <!-- ============================== -->
      <!-- COLOR CONTROLS                  -->
      <!-- ============================== -->
      <div id="color-controls" class="card">
        <h3>Customize the Card</h3>
        <button id="red-btn">Red Tint</button>
        <button id="blue-btn">Blue Tint</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
